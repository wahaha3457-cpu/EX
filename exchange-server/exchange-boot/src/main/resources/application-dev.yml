spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/exchange?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3s
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.exchange: INFO

exchange:
  jwt:
    issuer: exchange-dev
    secret: "dev-only-change-in-prod-min-32-chars-long-key!!"
    access-token-ttl: 30m
