        var bgDark = '#0b1220'

        function norm(raw) {
          if (raw === 'dark') return 'default'
          if (raw === 'light') return 'monochrome'
          if (raw === 'default' || raw === 'monochrome') return raw
          return 'default'
        }
        try {
          var v = localStorage.getItem(k)
          if (v == null) v = localStorage.getItem(legacy)
          v = norm(v)
          root.setAttribute('data-theme', v)
          if (v === 'default') root.classList.add('dark')
          else root.classList.remove('dark')
          root.style.colorScheme = v === 'default' ? 'dark' : 'light'
          var bg = v === 'default' ? bgDark : bgMono
          root.style.backgroundColor = bg
          if (document.body) document.body.style.backgroundColor = bg
          var tc = document.querySelector('meta[name="theme-color"]')
          if (tc) tc.setAttribute('content', bg)
        } catch (e) {
          root.setAttribute('data-theme', 'default')
          root.classList.add('dark')
          root.style.colorScheme = 'dark'
          root.style.backgroundColor = bgDark
